  - name: xero_accounts
    description: "Stores the Chart of Accounts from Xero — the complete list of ledger accounts used by the organisation for bookkeeping. Each row is one account (e.g. Sales Revenue, Bank Account, Accounts Payable). Accounts are the backbone of double-entry accounting: every financial transaction in Xero is posted to one or more accounts."
    business_context: "Use this table to look up account names, types, and classifications when analysing journal entries or transaction breakdowns. Useful for categorising revenue vs expenses, understanding which accounts are asset/liability/equity/revenue/expense, and filtering transactions by account type. Key for P&L and balance sheet analysis."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application (gen_random_uuid). Not the Xero AccountID."
        role: primary_key
      - name: accountId
        type: text
        description: "The Xero AccountID — a UUID assigned by Xero that uniquely identifies this account within Xero's system. Use this to join with journal lines or other Xero data that references accounts."
        role: foreign_key
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID (organisation identifier) this account belongs to. All data in the system is scoped per tenant; always filter by tenantId when querying to avoid mixing accounts from different organisations."
        required: true
      - name: xeroUserId
        type: text
        description: "The internal user ID of the platform user who connected this Xero organisation. Links back to xero_connections. Use tenantId for organisation-level filtering; xeroUserId is for user-session context."
        required: true
      - name: code
        type: text
        description: "The account code — a short alphanumeric identifier (e.g. '200', 'ACC001') used by the organisation to identify accounts in their chart of accounts. Often displayed in financial reports alongside the name."
      - name: name
        type: text
        description: "The human-readable name of the account (e.g. 'Sales', 'Bank Account', 'Accounts Payable', 'Office Expenses'). Use this for display in reports and labels rather than accountId or code."
        required: true
      - name: description
        type: text
        description: "Optional free-text description of the account's purpose, as defined by the user in Xero."
      - name: accountClass
        type: text
        description: "The high-level class of the account. Xero values: ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE. Determines which section of the balance sheet or P&L this account appears in. Use for broad financial category filtering."
        examples: ["ASSET", "LIABILITY", "EQUITY", "REVENUE", "EXPENSE"]
      - name: accountType
        type: text
        description: "The specific type of account within its class. More granular than accountClass. Examples: BANK (liquid cash accounts), CURRENT (current assets), FIXED (fixed assets), CURRLIAB (current liabilities), SALES (revenue from sales), OVERHEADS (fixed overhead expenses), DEPRECIATN (depreciation). Used for detailed balance sheet categorisation."
        examples:
          [
            "BANK",
            "CURRENT",
            "FIXED",
            "CURRLIAB",
            "TERMLIAB",
            "EQUITY",
            "SALES",
            "REVENUE",
            "DIRECTCOSTS",
            "OVERHEADS",
            "DEPRECIATN",
            "OTHERINCOME",
            "OTHEREXPENSE",
          ]
      - name: taxType
        type: text
        description: "The default tax rate applied to transactions posted to this account. E.g. 'TAX001' for standard GST/VAT, 'NONE' for zero-rated or exempt. Affects how tax is calculated on invoices and bills."
      - name: enablePaymentsToAccount
        type: boolean
        description: "True if this account can be used as the destination for payments (i.e. a bank or clearing account that can receive payments). Must be true to use this account in the 'paid to' field on an invoice payment."
        required: true
      - name: showInExpenseClaims
        type: boolean
        description: "True if this account appears in the expense claims module, allowing employees to assign expenses to it when submitting expense claims."
        required: true
      - name: status
        type: text
        description: "Account status in Xero. Values: ACTIVE (account is in use), ARCHIVED (account has been disabled/hidden but data is preserved). Only ACTIVE accounts are available for new transactions."
        examples: ["ACTIVE", "ARCHIVED"]
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "The timestamp (UTC) when this account was last modified in Xero. Set by Xero, not by our system."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first inserted into our local database (not the Xero creation date)."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp when this row was last updated in our local database, auto-managed by Prisma on every upsert."
        required: true

  - name: xero_bank_transactions
    description: "Stores spend/receive money transactions recorded directly against a bank account in Xero — i.e. bank transactions that are NOT associated with an invoice or bill (direct bank account debits and credits). Examples: direct bank fees, direct deposits, petty cash withdrawals. Each row represents one bank transaction with its line items."
    business_context: "Use this table to analyse cash movements at the bank account level, including unmatched or direct transactions. Useful for cash flow analysis, bank reconciliation status (isReconciled), and finding transactions by contact. Complement with xero_invoices and xero_payments for the full cash picture. Filter by type to separate money in (RECEIVE) from money out (SPEND)."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: compositeId
        type: text
        description: "Unique composite key formed by concatenating bankTransactionId and tenantId (format: '{bankTransactionId}_{tenantId}'). Ensures uniqueness across multi-tenant setups and used as the upsert key during sync."
        required: true
      - name: bankTransactionId
        type: text
        description: "The Xero BankTransactionID — a UUID assigned by Xero uniquely identifying this bank transaction within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this transaction to a specific organisation. Always filter by tenantId to isolate data for a single organisation."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries; xeroUserId is for session/user context."
        required: true
      - name: type
        type: text
        description: "Direction of the bank transaction. RECEIVE = money coming into the bank account (income/deposit). SPEND = money going out of the bank account (expense/withdrawal). Use to separate inflows from outflows in cash analysis."
        examples: ["RECEIVE", "SPEND"]
      - name: contactName
        type: text
        description: "The name of the contact (supplier or customer) associated with this transaction. Denormalised from the contact record for query convenience. May be NULL for transactions with no linked contact."
      - name: bankAccount
        type: jsonb
        description: "JSON object containing details of the bank account this transaction is posted to. Includes fields like AccountID (Xero account UUID), Code (account code), and Name (bank account name, e.g. 'Business Cheque Account'). Use bankAccount->>'Name' to display the bank account name."
      - name: date
        type: timestamp without time zone
        description: "The date of the bank transaction — when the money movement occurred. Use for time-series analysis and date filtering."
      - name: reference
        type: text
        description: "An optional reference string entered by the user on this transaction (e.g. cheque number, payment reference). Useful for searching specific transactions."
      - name: subTotal
        type: numeric
        description: "The transaction amount before tax (exclusive of tax). Stored as DECIMAL(18,4). Use for net amount analysis."
        required: true
      - name: totalTax
        type: numeric
        description: "The total tax amount on this transaction. Stored as DECIMAL(18,4). Add to subTotal to get the gross total."
        required: true
      - name: total
        type: numeric
        description: "The gross total of the transaction including tax (subTotal + totalTax). Stored as DECIMAL(18,4). This is the actual amount that moved through the bank account. Use ROUND(total, 2) for monetary display."
        required: true
      - name: lineItems
        type: jsonb
        description: "JSON array of line items within this bank transaction. Each line item includes Description, Quantity, UnitAmount, AccountCode, TaxType, and LineAmount. Use for detailed expense categorisation by account code."
      - name: isReconciled
        type: boolean
        description: "True if this bank transaction has been reconciled against a bank statement in Xero. False if it is still unreconciled. Use to filter reconciled vs pending transactions."
        required: true
      - name: currencyCode
        type: text
        description: "ISO 4217 currency code for this transaction (e.g. 'AUD', 'USD', 'GBP'). Matches the currency of the bank account."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this transaction was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_connections
    description: "Stores OAuth 2.0 connection credentials linking a platform user to a specific Xero organisation (tenant). Each row represents one active Xero connection — a user may have multiple rows if they connected multiple Xero organisations. This table holds the access/refresh tokens required to call the Xero API on behalf of the user."
    business_context: "This is an authentication/infrastructure table. Do NOT query it for financial data. Use it only to understand which tenantId belongs to which user (xeroUserId), or to check connection/sync status. Financial analysis queries should always filter by tenantId from the specific Xero data tables."
    columns:
      - name: id
        type: text
        description: "Internal UUID primary key for this connection record."
        role: primary_key
      - name: tenantId
        type: text
        description: "The Xero Tenant ID — the unique identifier for the connected Xero organisation. This is the primary multi-tenancy key used across ALL Xero data tables to scope data to one organisation."
        required: true
      - name: xeroUserId
        type: text
        description: "The Xero user ID returned by Xero's identity service. Identifies which Xero user account (not the platform user) made this connection. Combined with tenantId forms a unique connection."
        required: true
      - name: tenantName
        type: text
        description: "The human-readable name of the connected Xero organisation (e.g. 'Demo Company (AU)'). Use this to display which organisation is connected."
      - name: tenantType
        type: text
        description: "The type of Xero tenant. Typically 'ORGANISATION' for standard Xero organisations."
        examples: ["ORGANISATION"]
      - name: accessToken
        type: text
        description: "The OAuth 2.0 access token used to authenticate API calls to Xero. Short-lived (30 minutes). NEVER expose this in queries or responses — for internal use only."
        required: true
      - name: refreshToken
        type: text
        description: "The OAuth 2.0 refresh token used to obtain a new access token when it expires. Long-lived. NEVER expose this in queries or responses — for internal use only."
        required: true
      - name: idToken
        type: text
        description: "The OpenID Connect ID token returned by Xero, containing identity claims about the connected user. Used for user profile information."
      - name: tokenExpiry
        type: timestamp without time zone
        description: "The datetime when the current accessToken expires. The sync service checks this to know when to refresh the token before making API calls."
      - name: scopes
        type: text
        description: "Space-separated list of OAuth scopes granted by the user (e.g. 'openid profile email accounting.transactions accounting.contacts'). Determines which Xero API endpoints this connection can access."
      - name: syncStatus
        type: text
        description: "Current data sync state for this connection. Values: 'idle' (no sync running), 'syncing' (sync in progress), 'error' (last sync failed). Use to check if a tenant's data is up to date."
        examples: ["idle", "syncing", "error"]
        required: true
      - name: lastSyncedAt
        type: timestamp without time zone
        description: "Timestamp of the most recent successful data sync for this connection. NULL if never synced. Use to determine data freshness."
      - name: connectedAt
        type: timestamp without time zone
        description: "Timestamp when the user first connected this Xero organisation to the platform."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last update to this connection record (e.g. token refresh), auto-managed by Prisma."
        required: true

  - name: xero_contacts
    description: "Stores all contacts (customers and suppliers) from the Xero organisation. A contact in Xero is any person or business that the organisation transacts with — customers who pay invoices (ACCREC type) and/or suppliers who send bills (ACCPAY type). Each row is one contact with their identity, address, and tax info."
    business_context: "Use this table to resolve contact names in reports, segment by customer vs supplier (isCustomer / isSupplier flags), or find all transactions for a specific business. Join to xero_invoices on contactName (denormalised) or use as a lookup for contact details. Essential for accounts receivable (customer analysis) and accounts payable (supplier analysis)."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: contactId
        type: text
        description: "The Xero ContactID — a UUID assigned by Xero that uniquely identifies this contact within the organisation. Use this to link contacts to invoices, payments, or bank transactions."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this contact to a specific organisation. Always filter by tenantId when querying contacts."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: name
        type: text
        description: "The display name of the contact as shown in Xero (e.g. 'Acme Corp', 'John Smith'). This is the primary identifier for a contact — use this for display in reports. Indexed for fast name searches."
        required: true
      - name: emailAddress
        type: text
        description: "The primary email address of the contact. Used for sending invoices and statements."
      - name: companyNumber
        type: text
        description: "The company registration number or business registration number for the contact. May be NULL for individuals."
      - name: isSupplier
        type: boolean
        description: "True if this contact is a supplier (the organisation buys from them and receives bills from them). A contact can be both a supplier and a customer simultaneously."
        required: true
      - name: isCustomer
        type: boolean
        description: "True if this contact is a customer (the organisation sells to them and issues invoices to them). A contact can be both a customer and a supplier simultaneously."
        required: true
      - name: address
        type: text
        description: "Concatenated string representation of the contact's primary address (e.g. '123 Main St, Sydney NSW 2000, Australia'). Flattened from Xero's addresses array for query convenience."
      - name: phone
        type: text
        description: "Concatenated string of the contact's primary phone number. Flattened from Xero's phones array."
      - name: taxNumber
        type: text
        description: "The tax/VAT/GST registration number for this contact (e.g. ABN in Australia). Used for tax compliance and reporting."
      - name: accountNumber
        type: text
        description: "An internal account number assigned to this contact by the organisation (e.g. 'CUST-0042'). Organisation-defined, not a Xero system field."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this contact was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_credit_notes
    description: "Stores credit notes issued in Xero. A credit note is a document that reduces the amount owed by a customer (ACCRECCREDIT — accounts receivable credit) or reduces the amount owed to a supplier (ACCPAYCREDIT — accounts payable credit). Credit notes are typically issued to correct or partially/fully reverse an invoice or bill — e.g. goods returned, overcharge correction."
    business_context: "Use this table to calculate net revenue by subtracting credit note totals from invoice totals. Critical for accurate revenue and refund analysis. Segment by type to analyse customer refunds (ACCRECCREDIT) vs supplier credit notes received (ACCPAYCREDIT). Joining to xero_invoices on contactName gives the full invoice-to-credit-note picture for a customer."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: compositeId
        type: text
        description: "Unique composite key formed by concatenating creditNoteId and tenantId. Used as the upsert key during sync to ensure idempotent inserts."
        required: true
      - name: creditNoteId
        type: text
        description: "The Xero CreditNoteID — a UUID assigned by Xero uniquely identifying this credit note within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this credit note to a specific organisation. Always filter by tenantId."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: type
        type: text
        description: "The credit note direction. ACCRECCREDIT = credit note issued TO a customer (reduces what they owe, i.e. a customer refund). ACCPAYCREDIT = credit note received FROM a supplier (reduces what we owe them). Essential for AR vs AP analysis."
        examples: ["ACCRECCREDIT", "ACCPAYCREDIT"]
      - name: creditNoteNumber
        type: text
        description: "The human-readable credit note number (e.g. 'CN-0042') as displayed in Xero. User-defined or auto-generated by Xero."
      - name: contactName
        type: text
        description: "The name of the customer or supplier this credit note is for. Denormalised from the contact record for query convenience."
      - name: status
        type: text
        description: "The current status of the credit note. DRAFT = not yet submitted. SUBMITTED = awaiting approval. AUTHORISED = approved and active. PAID = fully allocated against invoices. VOIDED = cancelled."
        examples: ["DRAFT", "SUBMITTED", "AUTHORISED", "PAID", "VOIDED"]
      - name: date
        type: timestamp without time zone
        description: "The date the credit note was issued. Use for time-series analysis of refunds."
      - name: dueDate
        type: timestamp without time zone
        description: "For credit notes, this stores the fully paid/allocated date (FullyPaidOnDate in Xero) — the date on which the credit note was fully applied to invoices or refunded."
      - name: subTotal
        type: numeric
        description: "The credit note amount before tax. Stored as DECIMAL(18,4). Represents the net value of goods/services being credited."
        required: true
      - name: totalTax
        type: numeric
        description: "The total tax amount on this credit note. Stored as DECIMAL(18,4)."
        required: true
      - name: total
        type: numeric
        description: "The gross total of this credit note including tax (subTotal + totalTax). Stored as DECIMAL(18,4). This is the net amount by which receivables/payables are reduced. Use ROUND(total, 2) for display."
        required: true
      - name: lineItems
        type: jsonb
        description: "Full JSON array of line items on this credit note. Each item includes Description, Quantity, UnitAmount, AccountCode, TaxType, TaxAmount, and LineAmount. Use for detailed product/service breakdown of credits."
      - name: description
        type: text
        description: "Description of the first line item on the credit note, denormalised for query convenience (avoids JSON parsing for simple queries)."
      - name: quantity
        type: numeric
        description: "Quantity from the first line item. Denormalised for query convenience."
      - name: unitAmount
        type: numeric
        description: "Unit price from the first line item. Denormalised for query convenience."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this credit note was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_invoices
    description: "THE most important financial table. Stores all invoices and bills in the Xero organisation. An invoice in Xero can be one of two types: ACCREC (Accounts Receivable — a sales invoice issued TO a customer, money coming IN) or ACCPAY (Accounts Payable — a purchase bill received FROM a supplier, money going OUT). Each row represents one complete invoice/bill with its financial totals."
    business_context: "This is the primary table for revenue and expense analysis. Use ACCREC invoices for sales/revenue queries and ACCPAY invoices for purchase/expense queries. Key metrics: total (gross), subTotal (net), amountDue (outstanding AR/AP), amountPaid (collected). Join with xero_payments to reconcile payments, or with xero_credit_notes to calculate net revenue. Filter by status=AUTHORISED for approved transactions only. Essential for P&L, AR aging, AP aging, customer revenue ranking, and supplier spend analysis."
    sample_queries:
      - description: "Total revenue from sales invoices"
        sql: "SELECT SUM(total) FROM xero_invoices WHERE type = 'ACCREC' AND status = 'AUTHORISED' AND tenantId = '...'"
      - description: "Outstanding receivables (unpaid)"
        sql: "SELECT contactName, SUM(amountDue) FROM xero_invoices WHERE type = 'ACCREC' AND amountDue > 0 GROUP BY contactName ORDER BY SUM(amountDue) DESC"
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: compositeId
        type: text
        description: "Unique composite key formed by concatenating invoiceId and tenantId. Used as the upsert key during sync."
        required: true
      - name: invoiceId
        type: text
        description: "The Xero InvoiceID — a UUID assigned by Xero uniquely identifying this invoice/bill within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this invoice to a specific organisation. ALWAYS filter by tenantId to avoid mixing data across organisations."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: type
        type: text
        description: "The invoice type — the MOST IMPORTANT field for categorisation. ACCREC = Accounts Receivable = sales invoice issued to customers (revenue). ACCPAY = Accounts Payable = purchase bill received from suppliers (expense). Always filter by type when doing revenue or expense analysis."
        examples: ["ACCREC", "ACCPAY"]
      - name: contactName
        type: text
        description: "The name of the customer (for ACCREC) or supplier (for ACCPAY) on this invoice. Denormalised from xero_contacts for query convenience. Use for grouping by customer/supplier."
      - name: invoiceNumber
        type: text
        description: "The human-readable invoice number (e.g. 'INV-0042' for sales, 'BILL-0001' for purchases). User-defined or auto-generated by Xero. Use for display and reference lookups."
      - name: reference
        type: text
        description: "Optional reference number entered by the user (e.g. purchase order number, customer PO, bank reference). Useful for cross-referencing with external systems."
      - name: status
        type: text
        description: "The approval and payment status of the invoice. DRAFT = not yet submitted. SUBMITTED = awaiting approval. AUTHORISED = approved and active invoice (use this for financial analysis). PAID = fully paid. VOIDED = cancelled. DELETED = removed. For financial analysis, typically filter WHERE status IN ('AUTHORISED', 'PAID')."
        examples:
          ["DRAFT", "SUBMITTED", "AUTHORISED", "PAID", "VOIDED", "DELETED"]
      - name: date
        type: timestamp without time zone
        description: "The invoice date — the date the invoice/bill was raised. Use DATE_TRUNC for monthly/yearly aggregations. This is the primary date field for time-series revenue/expense analysis."
      - name: dueDate
        type: timestamp without time zone
        description: "The payment due date. Use this for AR/AP aging analysis: CURRENT_DATE - dueDate gives days overdue. NULL means no due date was set."
      - name: fullyPaidOnDate
        type: timestamp without time zone
        description: "The date on which this invoice was fully paid (amountDue = 0). NULL if still unpaid. Use this for payment timing analysis and days-to-pay metrics."
      - name: subTotal
        type: numeric
        description: "The invoice total before tax (net of tax). Stored as DECIMAL(18,4). Use for ex-tax revenue/expense analysis."
        role: metric
        required: true
      - name: totalTax
        type: numeric
        description: "The total GST/VAT/tax component on this invoice. Stored as DECIMAL(18,4). subTotal + totalTax = total."
        role: metric
        required: true
      - name: total
        type: numeric
        description: "The gross total of this invoice including all taxes (subTotal + totalTax). Stored as DECIMAL(18,4). This is the headline revenue/expense figure. Use ROUND(total, 2) for display. SUM(total) for ACCREC invoices = gross revenue."
        role: metric
        required: true
      - name: amountDue
        type: numeric
        description: "The amount still outstanding/unpaid on this invoice. Stored as DECIMAL(18,4). For ACCREC: this is the accounts receivable balance. For ACCPAY: this is the accounts payable balance. amountDue = total - amountPaid - credit notes applied. Zero means fully paid."
        role: metric
        required: true
      - name: amountPaid
        type: numeric
        description: "The total amount that has already been paid/collected against this invoice. Stored as DECIMAL(18,4). For ACCREC: cash actually received. amountPaid + amountDue = total (approximately, before credit notes)."
        role: metric
        required: true
      - name: description
        type: text
        description: "Description text from the first line item on the invoice. Denormalised for query convenience — gives a quick summary of what was sold/purchased without needing to parse lineItems JSON."
      - name: quantity
        type: numeric
        description: "Quantity from the first line item. Denormalised for query convenience."
      - name: unitAmount
        type: numeric
        description: "Unit price from the first line item. Denormalised for query convenience. unitAmount * quantity ≈ line item subtotal."
      - name: currencyCode
        type: text
        description: "ISO 4217 currency code for this invoice (e.g. 'AUD', 'USD', 'GBP', 'NZD'). All monetary values (total, amountDue, etc.) are in this currency."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this invoice was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_items
    description: "Stores the product and service catalogue (Items) from the Xero organisation. An Item in Xero is a pre-defined product or service that can be added to invoices, bills, and purchase orders — similar to a price list or SKU catalogue. Items can be tracked as inventory (stock levels maintained) or non-tracked (services/non-stock goods)."
    business_context: "Use this table to analyse product-level sales or purchase costs, look up standard pricing, or identify inventory levels. Join to invoice line items (via xero_invoices lineItems JSON, matching on item code) for product revenue breakdown. Use isTrackedAsInventory=true to filter physical stock items vs services. Use quantityOnHand for stock/inventory analysis."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: itemId
        type: text
        description: "The Xero ItemID — a UUID assigned by Xero that uniquely identifies this item within the organisation's product catalogue."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this item to a specific organisation. Always filter by tenantId."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: code
        type: text
        description: "The item code / SKU — a short alphanumeric identifier (e.g. 'PROD-001', 'SVC-CONSULT') used on invoices and bills. This is the primary lookup key when referencing items in line items."
      - name: name
        type: text
        description: "The display name of the item (e.g. 'Website Design Package', 'Office Chair', 'Monthly Support'). Shown on invoices and bills. Use this for display in product/service reports."
      - name: description
        type: text
        description: "Default description text that pre-fills on invoice/bill line items when this item is selected. Describes what the item is or what service is rendered."
      - name: inventoryAssetAccountCode
        type: text
        description: "The account code of the balance sheet asset account used to track the inventory value of this item (e.g. '630' for Inventory Asset). Only relevant when isTrackedAsInventory = true."
      - name: purchaseDetails
        type: jsonb
        description: "JSON object containing purchase-side details for this item: UnitPrice (purchase cost), AccountCode (expense account to post purchases to), TaxType (purchase tax rate), COGSAccountCode (Cost of Goods Sold account). Use for margin analysis: compare purchase unitPrice to selling unitPrice."
      - name: unitPrice
        type: numeric
        description: "The default selling price of this item (excluding tax). Stored as DECIMAL(18,4). This is the price that pre-fills on sales invoices when this item is added. Use for price list analysis."
      - name: totalCostPool
        type: numeric
        description: "The total cost pool value of tracked inventory (total cost of all units on hand). Stored as DECIMAL(18,4). totalCostPool / quantityOnHand gives the average unit cost. Relevant only when isTrackedAsInventory = true."
      - name: quantityOnHand
        type: numeric
        description: "The current stock quantity on hand for tracked inventory items. Stored as DECIMAL(18,4). NULL or 0 for non-tracked items. Use for inventory level reports and stock valuation."
      - name: isTrackedAsInventory
        type: boolean
        description: "True if Xero actively tracks stock levels (quantity on hand) for this item — meaning it reduces when sold and increases when purchased. False for services or non-stock items where inventory is not tracked."
        required: true
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this item was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_organisations
    description: "Stores organisation-level settings and metadata for each connected Xero organisation (tenant). Each row represents one Xero organisation — its legal identity, currency, tax settings, financial year definition, and operational configuration. This is the master record for understanding the context of all financial data."
    business_context: "Query this table to get organisation-level context needed for correct financial analysis: baseCurrency (for currency display), financialYearEndMonth (to define the financial year for YTD calculations), countryCode (for tax and locale), and periodLockDate (transactions before this date are locked). Always join or filter using tenantId. Use isDemoCompany to exclude test/demo organisations from analysis if needed."
    columns:
      - name: id
        type: text
        description: "Internal UUID primary key generated by the application. Same value as tenantId in this table."
        role: primary_key
      - name: tenantId
        type: text
        description: "The Xero Tenant ID — the unique identifier for this Xero organisation. This is the primary key that links all other Xero tables together. Use this in every cross-table join."
        required: true
      - name: name
        type: text
        description: "The trading name / display name of the Xero organisation (e.g. 'Acme Corp', 'My Landscaping Business'). Use this to display the organisation name in reports."
      - name: legalName
        type: text
        description: "The legal/registered name of the organisation, which may differ from the trading name. Used for formal documents and compliance."
      - name: organisationType
        type: text
        description: "The broad type of entity. Typically 'COMPANY', 'SOLE_TRADER', 'PARTNERSHIP', 'TRUST', or 'CHARITY'. Affects some tax and reporting rules."
        examples:
          [
            "COMPANY",
            "SOLE_TRADER",
            "PARTNERSHIP",
            "TRUST",
            "CHARITY",
            "NOT_FOR_PROFIT",
          ]
      - name: organisationEntityType
        type: text
        description: "More granular legal entity type as defined by Xero (e.g. 'COMPANY', 'INDIVIDUAL'). Jurisdiction-specific entity classifications."
      - name: organisationStatus
        type: text
        description: "The operational status of the Xero organisation. 'ACTIVE' for live organisations. May indicate trial or suspended states."
        examples: ["ACTIVE"]
      - name: isDemoCompany
        type: boolean
        description: "True if this is a Xero demo/sample company (pre-populated with fictional data). Exclude demo companies from real financial analysis by filtering WHERE isDemoCompany = false."
        required: true
      - name: edition
        type: text
        description: "The Xero product edition this organisation is on (e.g. 'BUSINESS', 'PARTNER'). Affects available features."
      - name: version
        type: text
        description: "The country-specific version of Xero (e.g. 'AU' for Australia, 'NZ' for New Zealand, 'GLOBAL' for international). Determines tax terminology and default rates."
        examples: ["AU", "NZ", "UK", "US", "GLOBAL"]
      - name: baseCurrency
        type: text
        description: "ISO 4217 code for the organisation's base/home currency (e.g. 'AUD', 'USD', 'GBP'). ALL financial amounts in other tables are reported in this currency unless currencyCode says otherwise. Critical for correct currency display."
        examples: ["AUD", "USD", "GBP", "NZD", "EUR"]
      - name: countryCode
        type: text
        description: "ISO 3166-1 alpha-2 country code (e.g. 'AU', 'US', 'GB'). Determines tax rules, default tax rates, and number formatting."
      - name: timezone
        type: text
        description: "The IANA timezone identifier for this organisation (e.g. 'Australia/Sydney', 'America/New_York'). Use for timezone-aware date calculations."
      - name: financialYearEndDay
        type: integer
        description: "The day of the month the financial year ends (e.g. 30 for June 30, 31 for March 31). Combined with financialYearEndMonth to define the organisation's financial year boundary for YTD and annual reporting."
      - name: financialYearEndMonth
        type: integer
        description: "The month number (1-12) when the financial year ends (e.g. 6 for June, 3 for March, 12 for December). CRITICAL for correct YTD and financial year calculations. Australian orgs typically end June (6); US orgs typically end December (12)."
        examples: [6, 3, 12]
      - name: taxNumber
        type: text
        description: "The organisation's tax registration number (e.g. ABN in Australia, IRD number in NZ, EIN in the US, VAT number in the UK). Used for tax compliance."
      - name: paysTax
        type: boolean
        description: "True if this organisation is registered for and pays GST/VAT/sales tax. False for tax-exempt or below-threshold organisations. Affects whether tax is applied on transactions."
      - name: salesTaxBasis
        type: text
        description: "The accounting basis for sales tax reporting. ACCRUALS = tax reported when invoice is raised. CASH = tax reported when payment is received. Critical for tax period reporting."
        examples: ["ACCRUALS", "CASH"]
      - name: salesTaxPeriod
        type: text
        description: "How frequently the organisation reports and remits sales tax. Typical values: MONTHLY, QUARTERLY, ANNUALLY. Affects tax period analysis."
        examples:
          ["MONTHLY", "QUARTERLY", "TWICEPERMONTH", "HALFYEARLY", "ANNUALLY"]
      - name: periodLockDate
        type: timestamp without time zone
        description: "The accounting period lock date. Transactions dated on or before this date are locked and cannot be modified in Xero. Use this to understand which historical periods are finalised for reporting."
      - name: createdDateUTC
        type: timestamp without time zone
        description: "The date this Xero organisation was created (set by Xero)."
      - name: addresses
        type: jsonb
        description: "JSON array of the organisation's registered addresses. Each entry includes AddressType (POBOX, STREET), AddressLine1-4, City, Region, PostalCode, and Country."
      - name: paymentTerms
        type: jsonb
        description: "JSON object containing the organisation's default payment terms for sales (Bills) and purchases (Sales). Each section includes Day and Type (DAYSAFTERBILLDATE, DAYSAFTERMONTHEND, etc.)."
      - name: syncedAt
        type: timestamp without time zone
        description: "Timestamp when this organisation's data was last synced from Xero. Use to assess data freshness."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_payments
    description: "Stores all payments recorded in Xero — i.e. the actual cash transactions that settle invoices (ACCREC) and bills (ACCPAY). A payment in Xero links a bank account to either an invoice or a bill and records how much was paid and on what date. Each row is one payment event. Note: payments differ from bank transactions — a payment is the settlement of an invoice, not a raw bank movement."
    business_context: "Use this table for cash flow analysis — it records when money actually changed hands, as opposed to xero_invoices which records when a debt was created. Key for days-to-pay analysis, cash receipts timelines, and cash basis P&L. The amount field is the cash paid. Join to xero_invoices via the invoice JSON field (contains InvoiceID) or via invoiceNumber to correlate payments with their invoices. The account field identifies which bank account the payment was made from/to."
    sample_queries:
      - description: "Total cash received in a period"
        sql: "SELECT SUM(amount) FROM xero_payments WHERE date >= '2025-07-01' AND date < '2026-07-01' AND tenantId = '...'"
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: compositeId
        type: text
        description: "Unique composite key formed by concatenating paymentId and tenantId. Used as the upsert key during sync."
        required: true
      - name: paymentId
        type: text
        description: "The Xero PaymentID — a UUID assigned by Xero uniquely identifying this payment within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this payment to a specific organisation. Always filter by tenantId."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: invoiceNumber
        type: text
        description: "The invoice number that this payment settles (e.g. 'INV-0042'). Denormalised for query convenience. Use to join to xero_invoices without parsing JSON."
      - name: invoice
        type: jsonb
        description: "JSON object with details of the invoice this payment is applied to. Contains InvoiceID (Xero UUID), InvoiceNumber, Type (ACCREC/ACCPAY), and AmountDue/AmountPaid. Use invoice->>'InvoiceID' to join to xero_invoices."
      - name: account
        type: jsonb
        description: "JSON object identifying the bank account the payment was made from (for bills) or received into (for invoices). Contains AccountID and Code. Use account->>'Code' to identify the bank account."
      - name: date
        type: timestamp without time zone
        description: "The date the payment was made/received. This is the CASH date — use this for cash-basis reporting and cash flow statements. Use DATE_TRUNC for period aggregations."
      - name: amount
        type: numeric
        description: "The cash amount of this payment. Stored as DECIMAL(18,4). This is the actual money that moved. SUM(amount) gives total cash received (for ACCREC invoices) or total cash paid (for ACCPAY invoices). Use ROUND(amount, 2) for display."
        role: metric
        required: true
      - name: paymentType
        type: text
        description: "The type of payment method or payment direction. Common values: ACCRECPAYMENT (customer payment received), ACCPAYPAYMENT (supplier payment made), AROVERPAYMENTPAYMENT, ARPREPAYMENTPAYMENT, APPREPAYMENTPAYMENT, APOVERPAYMENTPAYMENT."
        examples:
          [
            "ACCRECPAYMENT",
            "ACCPAYPAYMENT",
            "AROVERPAYMENTPAYMENT",
            "ARPREPAYMENTPAYMENT",
          ]
      - name: reference
        type: text
        description: "Optional reference number for the payment (e.g. bank transfer reference, cheque number, EFT reference). Use for payment tracing."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this payment was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_purchase_orders
    description: "Stores Purchase Orders (POs) from the Xero organisation. A purchase order is a formal document sent to a supplier committing to buy specified goods or services at agreed prices and quantities. POs sit upstream of bills — a PO becomes a bill (ACCPAY invoice) once the supplier delivers and invoices. Each row is one PO with its header and line item details."
    business_context: "Use this table to analyse procurement activity, committed spend (POs that haven't yet become bills), and purchasing trends by supplier. Useful for comparing ordered vs received goods and tracking procurement pipeline. Filter by status to see approved POs (AUTHORISED) still awaiting delivery, or BILLED POs that have converted to bills. Join to xero_invoices to match POs with their resulting bills."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: purchaseOrderId
        type: text
        description: "The Xero PurchaseOrderID — a UUID assigned by Xero uniquely identifying this purchase order within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this PO to a specific organisation. Always filter by tenantId."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: purchaseOrderNumber
        type: text
        description: "The human-readable PO number (e.g. 'PO-0001'). User-defined or auto-generated by Xero. Use for display and tracking."
      - name: contactName
        type: text
        description: "The name of the supplier this PO was sent to. Denormalised from the contact record for query convenience."
      - name: reference
        type: text
        description: "Optional internal reference number entered on the PO (e.g. internal requisition number, project code)."
      - name: status
        type: text
        description: "The current status of the purchase order. DRAFT = not yet submitted. SUBMITTED = sent for approval. AUTHORISED = approved PO (committed spend). BILLED = fully converted to a bill. DELETED = removed."
        examples: ["DRAFT", "SUBMITTED", "AUTHORISED", "BILLED", "DELETED"]
      - name: date
        type: timestamp without time zone
        description: "The date the purchase order was raised. Use for time-series procurement analysis."
      - name: deliveryDate
        type: timestamp without time zone
        description: "The requested/expected delivery date specified on the PO. Use for delivery timeline tracking."
      - name: expectedArrivalDate
        type: timestamp without time zone
        description: "The expected arrival date for the ordered goods. May differ from deliveryDate if logistics transit time is specified."
      - name: deliveryAddresses
        type: text
        description: "The delivery address for this purchase order as a concatenated string."
      - name: deliveryInstructions
        type: text
        description: "Free-text delivery instructions provided on the PO (e.g. 'Leave at loading dock', 'Call on arrival')."
      - name: telephone
        type: text
        description: "Contact telephone number added to the purchase order for the supplier or delivery contact."
      - name: lineItems
        type: jsonb
        description: "JSON array of line items on the purchase order. Each item includes Description, Quantity, UnitAmount, ItemCode, AccountCode, TaxType, and LineAmount. Use for detailed breakdown of what was ordered."
      - name: subTotal
        type: numeric
        description: "The PO total before tax. Stored as DECIMAL(18,4). Represents committed net spend."
        role: metric
        required: true
      - name: totalTax
        type: numeric
        description: "The total tax on this purchase order. Stored as DECIMAL(18,4)."
        role: metric
        required: true
      - name: total
        type: numeric
        description: "The gross total of the PO including tax (subTotal + totalTax). Stored as DECIMAL(18,4). This is the total committed spend on this PO. Use ROUND(total, 2) for display."
        role: metric
        required: true
      - name: currencyCode
        type: text
        description: "ISO 4217 currency code for this PO (e.g. 'AUD', 'USD'). All monetary values are in this currency."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this PO was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_quotes
    description: "Stores Quotes (sales estimates/proposals) from the Xero organisation. A quote in Xero is a document sent to a prospective customer outlining proposed goods or services and their prices before a sale is confirmed. Quotes are pre-sales documents — they can be accepted (converted to an invoice) or declined. Each row is one quote with its header and pricing details."
    business_context: "Use this table to analyse sales pipeline and conversion rates. Filter by status=ACCEPTED to find quotes converted to sales, or DECLINED/EXPIRED for lost opportunities. Compare total values of SENT quotes against ACCEPTED invoices to measure conversion. Join to xero_invoices on contactName to track which customers converted from quotes to invoices. Useful for sales forecasting and win/loss analysis."
    columns:
      - name: id
        type: uuid
        description: "Internal UUID primary key generated by the application."
        role: primary_key
      - name: quoteId
        type: text
        description: "The Xero QuoteID — a UUID assigned by Xero uniquely identifying this quote within the organisation."
        required: true
      - name: tenantId
        type: text
        description: "The Xero Tenant ID scoping this quote to a specific organisation. Always filter by tenantId."
        required: true
      - name: xeroUserId
        type: text
        description: "The platform user ID who owns the Xero connection. Use tenantId for financial queries."
        required: true
      - name: quoteNumber
        type: text
        description: "The human-readable quote number (e.g. 'QU-0042'). User-defined or auto-generated by Xero. Use for display and tracking."
      - name: contactName
        type: text
        description: "The name of the prospective customer this quote was sent to. Denormalised from the contact record for query convenience."
      - name: status
        type: text
        description: "The current status of the quote. DRAFT = not yet sent. SENT = sent to customer awaiting response. DECLINED = customer rejected. ACCEPTED = customer accepted (likely converted to invoice). INVOICED = converted to an invoice. DELETED = removed. Use ACCEPTED and INVOICED for won-deal analysis."
        examples:
          ["DRAFT", "SENT", "DECLINED", "ACCEPTED", "INVOICED", "DELETED"]
      - name: date
        type: timestamp without time zone
        description: "The date the quote was created/issued. Use for time-series pipeline analysis."
      - name: expiryDate
        type: timestamp without time zone
        description: "The date the quote offer expires. Quotes past this date that are still SENT/DRAFT are expired. Use for pipeline freshness analysis."
      - name: subTotal
        type: numeric
        description: "The quote total before tax. Stored as DECIMAL(18,4). Represents the proposed net revenue."
      - name: totalTax
        type: numeric
        description: "The total tax on this quote. Stored as DECIMAL(18,4)."
      - name: total
        type: numeric
        description: "The gross total of the quote including tax. Stored as DECIMAL(18,4). This is the proposed deal value — use SUM(total) on ACCEPTED/SENT quotes for pipeline value analysis."
        role: metric
      - name: quoteData
        type: jsonb
        description: "Full JSON blob of the quote as returned by Xero API. Contains complete line items, terms, title, summary, and any other quote fields not in the flattened columns. Use for detailed quote content analysis."
      - name: updatedDateUtc
        type: timestamp without time zone
        description: "Timestamp (UTC) when this quote was last updated in Xero."
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this row was first written to our local database."
        required: true
      - name: updatedAt
        type: timestamp without time zone
        description: "Timestamp of the last local database update, auto-managed by Prisma."
        required: true

  - name: xero_sync_runs
    description: "Stores the audit log of every data sync run executed against a Xero organisation. Each row is one sync attempt — recording when it started, whether it succeeded or failed, how many records were synced, and at which sync stage a failure occurred. The sync pipeline pulls data from Xero in multiple sequential stages (e.g. accounts → contacts → invoices → payments)."
    business_context: "Use this table to diagnose sync issues, understand data freshness, or build monitoring dashboards. Check the most recent completed run (status='complete') to know when data was last refreshed. Use failedAtLevel to identify which data type failed to sync. This is an operational monitoring table — not for financial analysis. Filter by tenantId to check sync health for a specific organisation."
    columns:
      - name: id
        type: text
        description: "Internal UUID primary key for this sync run record."
        role: primary_key
      - name: tenantId
        type: text
        description: "The Xero Tenant ID identifying which organisation this sync run was performed for."
        required: true
      - name: status
        type: text
        description: "The outcome of this sync run. 'running' = sync is currently in progress. 'complete' = sync finished successfully and all data was synced. 'failed' = sync encountered an error and stopped. Use to find the last successful sync."
        examples: ["running", "complete", "failed"]
        required: true
      - name: startedAt
        type: timestamp without time zone
        description: "Timestamp when this sync run began. Use with completedAt to calculate sync duration."
        required: true
      - name: completedAt
        type: timestamp without time zone
        description: "Timestamp when this sync run finished (either successfully or with failure). NULL if status is still 'running'. completedAt - startedAt gives sync duration."
      - name: failedAtLevel
        type: integer
        description: "If status='failed', this integer indicates which sequential sync stage failed (0-indexed). For example: 0 = failed at accounts, 1 = failed at contacts, 2 = failed at invoices, etc. NULL if status is 'complete' or 'running'. Use to diagnose which data type is failing to sync."
      - name: errorMessage
        type: text
        description: "The error message captured when the sync failed. Contains Xero API error details or system errors. NULL if status is 'complete'. Use for debugging failed syncs."
      - name: recordsSynced
        type: integer
        description: "The total number of records upserted to the database during this sync run. A higher number indicates more data was refreshed. Zero may indicate a failed sync or no data changes."
        required: true
      - name: createdAt
        type: timestamp without time zone
        description: "Timestamp when this sync run record was created in our local database."
        required: true
