tables:
  - name: _prisma_migrations
    description: "Internal Prisma migration tracking table. Records every database schema migration that has been applied to this database. NOT used for financial analysis — skip this table in all queries."
    business_context: "Internal infrastructure table only. Never query this table for financial data, reporting, or business intelligence. Always exclude from SQL generation."
